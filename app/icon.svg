<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" width="48" height="48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background for contrast in browser tab -->
  <rect width="48" height="48" rx="10" fill="white"/>

  <!-- Glow disc -->
  <circle cx="24" cy="24" r="23" fill="url(#gl)"/>

  <!-- Outer ring -->
  <circle cx="24" cy="24" r="21" stroke="url(#g)" stroke-width="2.5"/>

  <!-- 6 aperture chords -->
  <line x1="28.62" y1="16"  x2="40.10" y2="35.88" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="19.38" y1="16"  x2="42.34" y2="16"    stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14.76" y1="24"  x2="26.24" y2="4.12"  stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="19.38" y1="32"  x2="7.90"  y2="12.12" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="28.62" y1="32"  x2="5.66"  y2="32"    stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="33.24" y1="24"  x2="21.76" y2="43.88" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Centre iris -->
  <circle cx="24" cy="24" r="5.5" fill="url(#g)" opacity="0.18"/>
  <circle cx="24" cy="24" r="3"   fill="url(#g)"/>
  <circle cx="24" cy="24" r="1.2" fill="white"/>
</svg>
