<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Gauge icon — center (26,44) radius 20 -->

  <!-- Tick marks at 0%, 25%, 50%, 75%, 100% of the arc -->
  <!-- 100% = 0° math (right): outer (46,44) inner (43,44) -->
  <line x1="46" y1="44" x2="42" y2="44" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 0% = 180° math (left): outer (6,44) inner (9,44) -->
  <line x1="6"  y1="44" x2="10" y2="44" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 50% = 90° math (top): outer (26,24) inner (26,27) -->
  <line x1="26" y1="24" x2="26" y2="28" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 25% = 135° math: cos135=−0.707 sin135=0.707 → (26−14.14, 44−14.14)=(11.86,29.86) outer; inner ~(14.7,32.7) -->
  <line x1="11.9" y1="29.9" x2="14.2" y2="32.2" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 75% = 45° math: cos45=0.707 sin45=0.707 → (26+14.14,44−14.14)=(40.14,29.86) outer; inner ~(37.3,32.7) -->
  <line x1="40.1" y1="29.9" x2="37.8" y2="32.2" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Background track (full semicircle, left→right through top) sweep=0 counterclockwise on screen -->
  <path d="M 6,44 A 20,20 0 0,0 46,44"
        stroke="#E2E8F0" stroke-width="5" stroke-linecap="round"/>

  <!-- Active arc (0% to 75%): from left (6,44) to 45°-point (40.14,29.86) -->
  <!-- 135° arc < 180° → large-arc=0 -->
  <path d="M 6,44 A 20,20 0 0,0 40.14,29.86"
        stroke="#10B981" stroke-width="5" stroke-linecap="round"/>

  <!-- Needle -->
  <line x1="26" y1="44" x2="40.14" y2="29.86"
        stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>

  <!-- Pivot -->
  <circle cx="26" cy="44" r="3.5" fill="#0F172A"/>

  <!-- Needle tip dot -->
  <circle cx="40.14" cy="29.86" r="2.5" fill="#10B981"/>
</svg>
